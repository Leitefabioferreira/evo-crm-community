services:
  evo-nexus-dashboard:
    image: evoapicloud/evo-nexus-dashboard:latest
    restart: unless-stopped
    expose:
      - "8080"
      - "32352"
    env_file: .env.nexus
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      OPENAI_MODEL: "gpt-4o-mini"
    command: ["bash", "-c", "pip3 install pyyaml websocket-client flask-limiter --break-system-packages -q 2>/dev/null || true; CLAUDE_BIN=$(find /usr/lib/node_modules/@anthropic-ai /usr/local/lib/node_modules/@anthropic-ai /workspace/dashboard/terminal-server/node_modules/@anthropic-ai -type f -name claude 2>/dev/null | grep -v '__pycache__\\|\\.js$' | head -1); [ -n \"$CLAUDE_BIN\" ] && ln -sf \"$CLAUDE_BIN\" /usr/bin/claude && echo \"[boot] claude -> $CLAUDE_BIN\" || echo '[boot] AVISO: claude binary nao encontrado'; python3 /boot/nexus-boot.py; exec bash /usr/local/bin/start-dashboard.sh"]
    volumes:
      - nexus_config:/workspace/config
      - nexus_workspace:/workspace/workspace
      - nexus_data:/workspace/dashboard/data
      - nexus_memory:/workspace/memory
      - nexus_logs:/workspace/ADWs/logs
      - nexus_venv:/workspace/.venv
      - nexus_claude:/workspace/.claude
      - ./nexus-boot.py:/boot/nexus-boot.py:ro
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  evo-nexus-nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nexus-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - default
    depends_on:
      evo-nexus-dashboard:
        condition: service_healthy

  evo-nexus-scheduler:
    image: evoapicloud/evo-nexus-runtime:latest
    restart: unless-stopped
    env_file: .env.nexus
    environment:
      SERVICE_TYPE: scheduler
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      OPENAI_MODEL: "gpt-4o-mini"
    command: ["bash", "-c", "python3 /workspace/config/scheduler-boot.py 2>/dev/null || true; uv run python scheduler.py"]
    volumes:
      - nexus_config:/workspace/config
      - nexus_workspace:/workspace/workspace
      - nexus_claude:/workspace/.claude
      - nexus_logs:/workspace/ADWs/logs
    networks:
      - default
    depends_on:
      evo-nexus-dashboard:
        condition: service_healthy

volumes:
  nexus_config:
  nexus_workspace:
  nexus_data:
  nexus_memory:
  nexus_logs:
  nexus_venv:
  nexus_claude:

networks:
  default:
    external: true
    name: evo-crm-community_default
