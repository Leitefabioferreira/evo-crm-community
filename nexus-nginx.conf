# EvoNexus Dashboard — Nginx reverse proxy
# /terminal/* → evo-nexus-dashboard:32352 (Node.js terminal-server, WebSocket)
# /*          → evo-nexus-dashboard:8080  (Python Flask dashboard)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream nexus_dashboard {
    server evo-nexus-dashboard:8080;
    keepalive 32;
}

upstream nexus_terminal {
    server evo-nexus-dashboard:32352;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # Terminal WebSocket + REST API → direct to Node.js terminal-server (32352)
    # Trailing slash on proxy_pass strips /terminal prefix: /terminal/ws → /ws
    location /terminal/ {
        proxy_pass http://nexus_terminal/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Everything else → Flask dashboard (8080)
    location / {
        proxy_pass http://nexus_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
