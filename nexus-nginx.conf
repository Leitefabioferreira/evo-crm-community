# EvoNexus Dashboard — Nginx reverse proxy
# Proxies port 80 → evo-nexus-dashboard:8080
# Handles WebSocket connections for terminal sessions

upstream nexus_dashboard {
    server evo-nexus-dashboard:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # WebSocket support (terminal sessions)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://nexus_dashboard;
    }
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
